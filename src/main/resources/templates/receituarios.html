<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Receituários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link" href="/consulta">Consultas</a>
            <a class="nav-link active" href="/receituario">Receituários</a>
        </div>

    </div>

</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Receituários</h2>

        <a href="/receituario/novo" class="btn btn-success">
            Novo Receituário
        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover table-striped align-middle">

                <thead class="table-primary">

                <tr>
                    <th>Código</th>
                    <th>Prontuário</th>
                    <th>Observação</th>
                    <th width="280">Ações</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="receituario : ${receituarios}">

                    <td th:text="${receituario.codigo}"></td>

                    <td th:text="${receituario.prontuario != null ? receituario.prontuario.codigo : '-'}"></td>

                    <td th:text="${receituario.observacao}"></td>

                    <td>

                        <a class="btn btn-primary btn-sm"
                           th:href="@{'/itemReceituario/novo?receituario=' + ${receituario.codigo}}">
                            Medicamentos
                        </a>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/receituario/' + ${receituario.codigo}}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{'/receituario/delete/' + ${receituario.codigo}}">
                            Excluir
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(receituarios)}">

                    <td colspan="4" class="text-center">
                        Nenhum receituário cadastrado.
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
