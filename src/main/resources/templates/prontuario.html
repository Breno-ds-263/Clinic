<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prontuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">

            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link" href="/consulta">Consultas</a>
            <a class="nav-link active" href="/prontuario">Prontuários</a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">Cadastro de Prontuário</h2>

            <form th:action="@{/prontuario}" method="post">

                <input type="hidden"
                       name="codigo"
                       th:value="${prontuario.codigo}">

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    <textarea
                            name="descricao"
                            class="form-control"
                            rows="5"
                            th:text="${prontuario.descricao}">
                    </textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Observação
                    </label>

                    <textarea
                            name="observacao"
                            class="form-control"
                            rows="4"
                            th:text="${prontuario.observacao}">
                    </textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Consulta
                    </label>

                    <input
                            type="number"
                            name="consulta.codigo"
                            class="form-control"
                            th:value="${prontuario.consulta != null ? prontuario.consulta.codigo : ''}">

                </div>

                <button class="btn btn-success">
                    Salvar
                </button>

                <a href="/prontuario"
                   class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
