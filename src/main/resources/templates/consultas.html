<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link" href="/medicamento">Medicamentos</a>
            <a class="nav-link active" href="/consulta">Consultas</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Consultas Cadastradas</h2>

        <a href="/consulta/novo" class="btn btn-success">
            Nova Consulta
        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover table-striped align-middle">

                <thead class="table-primary">

                <tr>
                    <th>Código</th>
                    <th>Paciente</th>
                    <th>Médico</th>
                    <th>Retorno</th>
                    <th>Observação</th>
                    <th width="220">Ações</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="consulta : ${consultas}">

                    <td th:text="${consulta.codigo}"></td>

                    <td th:text="${consulta.paciente != null ? consulta.paciente.nome : '-'}"></td>

                    <td th:text="${consulta.medico != null ? consulta.medico.nome : '-'}"></td>

                    <td th:text="${consulta.dataHoraVolta}"></td>

                    <td th:text="${consulta.observarcao}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/consulta/' + ${consulta.codigo}}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{'/consulta/delete/' + ${consulta.codigo}}">
                            Excluir
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(consultas)}">

                    <td colspan="6" class="text-center">
                        Nenhuma consulta cadastrada.
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
