<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Itens do Receituário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link" href="/consulta">Consultas</a>
            <a class="nav-link active" href="/receituario">Receituários</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Medicamentos dos Receituários</h2>

        <a href="/itemReceituario/novo" class="btn btn-success">
            Novo Item
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover table-striped align-middle">

                <thead class="table-primary">
                <tr>
                    <th>Código</th>
                    <th>Receituário</th>
                    <th>Medicamento</th>
                    <th>Dosagem</th>
                    <th>Intervalo</th>
                    <th>Observação</th>
                    <th width="180">Ações</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="item : ${itens}">
                    <td th:text="${item.codigo}"></td>

                    <td th:text="${item.receituario != null ? item.receituario.codigo : '-'}"></td>

                    <td th:text="${item.medicamento != null ? item.medicamento.nome : '-'}"></td>

                    <td th:text="${item.dosagem}"></td>

                    <td th:text="${item.intervaloEntreDoses + ' horas'}"></td>

                    <td th:text="${item.observacao}"></td>

                    <td>
                        <a class="btn btn-danger btn-sm"
                           th:href="@{'/itemReceituario/delete/' + ${item.codigo}}">
                            Excluir
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(itens)}">
                    <td colspan="7" class="text-center">
                        Nenhum medicamento adicionado ao receituário.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
