<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link" href="/medicamento">Medicamentos</a>
            <a class="nav-link active" href="/consulta">Consultas</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">Cadastro de Consulta</h2>

            <form th:action="@{/consulta}" method="post">

                <div class="mb-3">
                    <label class="form-label">Paciente</label>

                    <select name="cpfPaciente" class="form-select" required>
                        <option value="">Selecione um paciente</option>

                        <option th:each="paciente : ${pacientes}"
                                th:value="${paciente.cpf}"
                                th:text="${paciente.nome + ' - CPF: ' + paciente.cpf}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Médico</label>

                    <select name="crmMedico" class="form-select" required>
                        <option value="">Selecione um médico</option>

                        <option th:each="medico : ${medicos}"
                                th:value="${medico.crm}"
                                th:text="${medico.nome + ' - CRM: ' + medico.crm}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Data/Hora de Retorno</label>
                    <input type="datetime-local" name="dataHoraVolta" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Observação</label>
                    <textarea name="observacao" class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Salvar Consulta
                </button>

                <a href="/consulta" class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
