<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Área do Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Área do Médico</span>
        <a href="/login-medico/logout" class="btn btn-outline-light btn-sm">Sair</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Consultas Pendentes</h2>

    <table class="table table-bordered table-striped bg-white shadow-sm">
        <thead class="table-success">
        <tr>
            <th>Código</th>
            <th>Paciente</th>
            <th>Contato</th>
            <th>Observação</th>
            <th>Ação</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="consulta : ${consultas}">
            <td th:text="${consulta.codigo}"></td>
            <td th:text="${consulta.paciente.nome}"></td>
            <td th:text="${consulta.paciente.contato}"></td>
            <td th:text="${consulta.observacao}"></td>
            <td>
                <a th:href="@{'/area-medico/consulta/' + ${consulta.codigo}}" class="btn btn-primary btn-sm">
                    Atender
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/area-medico/realizadas" class="btn btn-secondary">Consultas Realizadas</a>
</div>

</body>
</html>
