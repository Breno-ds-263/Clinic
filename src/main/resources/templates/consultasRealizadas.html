<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas Realizadas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Consultas Realizadas</span>

        <a href="/area-medico" class="btn btn-outline-light">
            Voltar
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Consultas Finalizadas</h4>
        </div>

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-success">
                <tr>
                    <th>Código</th>
                    <th>Paciente</th>
                    <th>Contato</th>
                    <th>Médico</th>
                    <th>Observação</th>
                    <th width="170">Ações</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="consulta : ${consultas}">

                    <td th:text="${consulta.codigo}"></td>

                    <td th:text="${consulta.paciente.nome}"></td>

                    <td th:text="${consulta.paciente.contato}"></td>

                    <td th:text="${consulta.medico.nome}"></td>

                    <td th:text="${consulta.observacao}"></td>

                    <td>

                        <a class="btn btn-primary btn-sm"
                           th:href="@{'/area-medico/realizadas/' + ${consulta.codigo}}">
                            Ver Prontuário
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(consultas)}">

                    <td colspan="6" class="text-center">

                        Nenhuma consulta realizada.

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
