<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a href="/" class="navbar-brand">Sistema Clínica</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Pacientes</h2>
        <a href="/paciente/novo" class="btn btn-primary">Novo Paciente</a>
    </div>

    <table class="table table-striped table-bordered bg-white shadow-sm">
        <thead class="table-primary">
        <tr>
            <th>CPF</th>
            <th>Nome</th>
            <th>Endereço</th>
            <th>Contato</th>
            <th>Plano</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="paciente : ${pacientes}">
            <td th:text="${paciente.cpf}"></td>
            <td th:text="${paciente.nome}"></td>
            <td th:text="${paciente.endereco}"></td>
            <td th:text="${paciente.contato}"></td>
            <td th:text="${paciente.planoSaude}"></td>
            <td>
                <a th:href="@{'/paciente/delete/' + ${paciente.cpf}}" class="btn btn-danger btn-sm">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
