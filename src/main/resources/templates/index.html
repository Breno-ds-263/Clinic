<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Sistema Clínica</span>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="mb-4">Sistema de Clínica</h1>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4>Área do Atendente</h4>
                    <p>Gerenciar pacientes, médicos, medicamentos e consultas.</p>
                    <a href="/paciente" class="btn btn-primary">Pacientes</a>
                    <a href="/medico" class="btn btn-primary">Médicos</a>
                    <a href="/medicamento" class="btn btn-primary">Medicamentos</a>
                    <a href="/consulta" class="btn btn-primary">Consultas</a>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4>Área do Médico</h4>
                    <p>Acessar consultas, prontuários e receituários.</p>
                    <a href="/login-medico" class="btn btn-success">Login Médico</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
