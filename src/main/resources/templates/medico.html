<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a href="/" class="navbar-brand">Sistema Clínica</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4">Cadastro de Médico</h2>

            <form th:action="@{/medico}" method="post">

                <div class="mb-3">
                    <label class="form-label">CRM</label>
                    <input type="text" name="crm" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Especialidade</label>
                    <input type="text" name="especialidade" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contato</label>
                    <input type="text" name="contato" class="form-control">
                </div>

                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/medico}" class="btn btn-secondary">Voltar</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
