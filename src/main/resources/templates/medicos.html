<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link active" href="/medico">Médicos</a>
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/consulta">Consultas</a>
            <a class="nav-link" href="/medicamento">Medicamentos</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Médicos Cadastrados</h2>

        <a href="/medico/novo" class="btn btn-success">
            Novo Médico
        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover table-striped align-middle">

                <thead class="table-primary">

                <tr>
                    <th>CRM</th>
                    <th>Nome</th>
                    <th>Especialidade</th>
                    <th>Contato</th>
                    <th width="220">Ações</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="medico : ${medicos}">

                    <td th:text="${medico.crm}"></td>

                    <td th:text="${medico.nome}"></td>

                    <td th:text="${medico.especialidade}"></td>

                    <td th:text="${medico.contato}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/medico/' + ${medico.crm}}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{'/medico/delete/' + ${medico.crm}}">
                            Excluir
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(medicos)}">

                    <td colspan="5" class="text-center">
                        Nenhum médico cadastrado.
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
