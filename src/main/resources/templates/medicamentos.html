<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicamentos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="/">Sistema Clínica</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/paciente">Pacientes</a>
            <a class="nav-link" href="/medico">Médicos</a>
            <a class="nav-link active" href="/medicamento">Medicamentos</a>
            <a class="nav-link" href="/consulta">Consultas</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Medicamentos Cadastrados</h2>

        <a href="/medicamento/novo" class="btn btn-success">
            Novo Medicamento
        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-primary">

                <tr>
                    <th>Código</th>
                    <th>Nome</th>
                    <th>Dosagem</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th width="220">Ações</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="medicamento : ${medicamentos}">

                    <td th:text="${medicamento.codigo}"></td>

                    <td th:text="${medicamento.nome}"></td>

                    <td th:text="${medicamento.dosagem}"></td>

                    <td th:text="${medicamento.tipoDosagem}"></td>

                    <td th:text="${medicamento.descricao}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/medicamento/' + ${medicamento.codigo}}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{'/medicamento/delete/' + ${medicamento.codigo}}">
                            Excluir
                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(medicamentos)}">

                    <td colspan="6" class="text-center">
                        Nenhum medicamento cadastrado.
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
